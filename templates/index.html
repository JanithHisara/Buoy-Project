<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanNav — Sign In</title>
    <meta name="description" content="OceanNav Buoy Navigation & Monitoring System — Sign In">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* ── Page Background ── */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #050d1a 0%, #0a1628 55%, #071220 100%);
            overflow: hidden;
        }

        /* ── Animated floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 420px; height: 420px; background: #00d4ff; top: -120px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #0077ff; bottom: -80px; right: -60px; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; background: #7b2cbf; bottom: 20%; left: 10%; animation-delay: -8s; opacity: 0.12; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.05); }
        }

        /* ── Wave decoration ── */
        .auth-bg-waves {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .wave {
            position: absolute;
            bottom: -10px; left: -10px; right: -10px;
            height: 200px;
            border-radius: 50% 50% 0 0;
            animation: waveAnim 6s ease-in-out infinite;
        }
        .wave1 { background: rgba(0,212,255,0.04); animation-delay: 0s; }
        .wave2 { background: rgba(0,119,255,0.03); animation-delay: -2s; height: 160px; }
        .wave3 { background: rgba(0,212,255,0.02); animation-delay: -4s; height: 120px; }
        @keyframes waveAnim {
            0%,100% { transform: translateY(0) scaleX(1); }
            50%      { transform: translateY(-20px) scaleX(1.02); }
        }

        /* ── Auth card ── */
        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(13, 21, 37, 0.88);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 24px;
            padding: 48px 44px 44px;
            width: 420px;
            max-width: calc(100vw - 32px);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 0 0 1px rgba(0,212,255,0.05),
                        0 30px 80px rgba(0,0,0,0.55),
                        0 0 60px rgba(0,212,255,0.04);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* Top gradient accent line */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d4ff, #0077ff, transparent);
            border-radius: 1px;
        }

        /* ── Logo ── */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 13px;
            margin-bottom: 6px;
        }

        .auth-logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #00d4ff, #0077ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 6px 20px rgba(0,212,255,0.3);
            flex-shrink: 0;
        }

        .auth-logo h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 27px;
            color: #e8f4f8;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .auth-logo h1 span { color: #00d4ff; }

        .auth-tagline {
            font-size: 12.5px;
            color: rgba(122, 154, 181, 0.8);
            margin-bottom: 36px;
            margin-left: 59px;
            letter-spacing: 0.2px;
        }

        /* ── Mode switcher pill ── */
        .mode-switcher {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 28px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .mode-btn.active {
            background: rgba(0,212,255,0.13);
            border: 1px solid rgba(0,212,255,0.28);
            color: #00d4ff;
            box-shadow: 0 2px 10px rgba(0,212,255,0.1);
        }

        .mode-btn i { font-size: 12px; }

        /* ── Form fields ── */
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 16px;
        }

        .form-field label {
            font-size: 11.5px;
            font-weight: 600;
            color: #7a9ab5;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-field label i { font-size: 10px; opacity: 0.7; }

        .input-wrap {
            position: relative;
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #3d5a73;
            font-size: 14px;
            pointer-events: none;
            transition: color 0.25s;
        }

        .input-wrap input {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 44px 13px 44px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 11px;
            color: #e8f4f8;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        .input-wrap input::placeholder { color: #3d5a73; }

        .input-wrap input:hover {
            border-color: rgba(0,212,255,0.22);
            background: rgba(255,255,255,0.06);
        }

        .input-wrap input:focus {
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
            background: rgba(0,212,255,0.04);
        }

        .input-wrap input:focus ~ .input-icon,
        .input-wrap:focus-within .input-icon { color: #00d4ff; }

        /* Password toggle */
        .pw-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #3d5a73;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
            z-index: 1;
        }
        .pw-eye:hover { color: #00d4ff; }

        /* ── Submit button ── */
        .auth-submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #0077ff 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(0,119,255,0.35);
            transition: all 0.28s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            position: relative;
            overflow: hidden;
        }

        .auth-submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(0,119,255,0.45);
        }

        .auth-submit-btn:hover::before { opacity: 1; }
        .auth-submit-btn:active { transform: translateY(0); }

        .auth-submit-btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-spinner {
            width: 17px; height: 17px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .auth-submit-btn.loading .btn-spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error message ── */
        .auth-error {
            margin-top: 14px;
            padding: 11px 14px;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 10px;
            color: #ff6b7a;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        /* ── Mode toggle link ── */
        .auth-mode-toggle {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #4a6785;
        }

        .auth-mode-toggle a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: opacity 0.2s;
        }

        .auth-mode-toggle a:hover { opacity: 0.8; }

        /* ── Sign-up hidden fields slide ── */
        .signup-only {
            display: none;
            overflow: hidden;
            animation: slideDown 0.3s ease both;
        }

        .signup-only.visible { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Divider ── */
        .auth-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
            margin: 20px 0;
        }

        /* ── Info hint ── */
        .auth-hint {
            font-size: 11.5px;
            color: #3d5a73;
            margin-top: -6px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="auth-bg-waves">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <!-- Auth card -->
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">🌊</div>
            <h1>Ocean<span>Nav</span></h1>
        </div>
        <div class="auth-tagline">Buoy Navigation &amp; Monitoring System</div>

        <!-- Sign In / Sign Up toggle -->
        <div class="mode-switcher">
            <button class="mode-btn active" id="btn-signin" onclick="setMode('login')">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
            <button class="mode-btn" id="btn-signup" onclick="setMode('signup')">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </button>
        </div>

        <!-- Full Name (sign-up only) -->
        <div class="signup-only" id="field-name">
            <label><i class="fa-solid fa-id-card"></i> Full Name</label>
            <div class="input-wrap">
                <input type="text" id="auth-name" placeholder="e.g. Nimal Perera" autocomplete="name">
                <i class="fa-solid fa-user input-icon"></i>
            </div>
        </div>

        <!-- Email -->
        <div class="form-field">
            <label><i class="fa-solid fa-envelope"></i> Email Address</label>
            <div class="input-wrap">
                <input type="email" id="auth-email" placeholder="you@gmail.com" autocomplete="email">
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>
        </div>

        <!-- Password -->
        <div class="form-field">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <div class="input-wrap">
                <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
                <i class="fa-solid fa-lock input-icon"></i>
                <button class="pw-eye" type="button" onclick="togglePw('auth-password', this)" title="Show/hide password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Confirm Password (sign-up only) -->
        <div class="signup-only" id="field-confirm">
            <label><i class="fa-solid fa-lock"></i> Confirm Password</label>
            <div class="input-wrap">
                <input type="password" id="auth-confirm" placeholder="••••••••" autocomplete="new-password">
                <i class="fa-solid fa-lock input-icon"></i>
                <button class="pw-eye" type="button" onclick="togglePw('auth-confirm', this)" title="Show/hide password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Hint text -->
        <div class="auth-hint" id="auth-hint">
            <i class="fa-solid fa-circle-info"></i>
            <span id="auth-hint-text">Sign in with your registered email and password.</span>
        </div>

        <!-- Submit -->
        <button class="auth-submit-btn" id="auth-submit" onclick="handleSubmit()">
            <div class="btn-spinner"></div>
            <i class="fa-solid fa-right-to-bracket" id="submit-icon"></i>
            <span id="submit-label">Sign In to OceanNav</span>
        </button>

        <!-- Error -->
        <div class="auth-error" id="auth-error">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="auth-error-msg"></span>
        </div>

        <!-- Mode toggle -->
        <div class="auth-mode-toggle" id="auth-mode-toggle">
            Don't have an account?
            <a href="#" onclick="setMode('signup'); return false;">Sign Up</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        let authMode = 'login';

        /* ── Toggle password visibility ── */
        function togglePw(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }

        /* ── Switch between Sign In and Sign Up ── */
        function setMode(mode) {
            authMode = mode;
            const isSignup = mode === 'signup';

            // Toggle mode buttons
            document.getElementById('btn-signin').classList.toggle('active', !isSignup);
            document.getElementById('btn-signup').classList.toggle('active',  isSignup);

            // Show/hide sign-up only fields
            document.getElementById('field-name').classList.toggle('visible', isSignup);
            document.getElementById('field-confirm').classList.toggle('visible', isSignup);

            // Update hint
            const hintEl = document.getElementById('auth-hint-text');
            hintEl.textContent = isSignup
                ? 'Create your OceanNav account using a Gmail address.'
                : 'Sign in with your registered email and password.';

            // Update button
            document.getElementById('submit-icon').className = isSignup
                ? 'fa-solid fa-user-plus'
                : 'fa-solid fa-right-to-bracket';
            document.getElementById('submit-label').textContent = isSignup
                ? 'Create Account'
                : 'Sign In to OceanNav';

            // Update footer link
            document.getElementById('auth-mode-toggle').innerHTML = isSignup
                ? `Already have an account? <a href="#" onclick="setMode('login'); return false;">Sign In</a>`
                : `Don't have an account? <a href="#" onclick="setMode('signup'); return false;">Sign Up</a>`;

            // Clear errors and fields
            hideError();
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
            document.getElementById('auth-name').value = '';
            document.getElementById('auth-confirm').value = '';
        }

        /* ── Show / hide error ── */
        function showError(msg) {
            const el = document.getElementById('auth-error');
            document.getElementById('auth-error-msg').textContent = msg;
            el.style.display = 'flex';
        }

        function hideError() {
            document.getElementById('auth-error').style.display = 'none';
        }

        /* ── Handle sign-in / sign-up ── */
        async function handleSubmit() {
            hideError();
            const email    = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            const btn = document.getElementById('auth-submit');

            /* ─ SIGN UP ─ */
            if (authMode === 'signup') {
                const name    = document.getElementById('auth-name').value.trim();
                const confirm = document.getElementById('auth-confirm').value;

                if (!name) {
                    showError('Please enter your full name.');
                    return;
                }
                if (!email.endsWith('@gmail.com')) {
                    showError('Sign up requires a Gmail address (e.g. you@gmail.com).');
                    return;
                }
                if (password.length < 6) {
                    showError('Password must be at least 6 characters.');
                    return;
                }
                if (password !== confirm) {
                    showError('Passwords do not match.');
                    return;
                }

                btn.classList.add('loading');
                try {
                    const res  = await fetch('/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, role: 'user' })
                    });
                    const data = await res.json();
                    if (data.success) {
                        window.location.href = '/dashboard';
                    } else {
                        showError(data.error || 'Registration failed. Please try again.');
                        btn.classList.remove('loading');
                    }
                } catch (e) {
                    showError('Connection error. Please try again.');
                    btn.classList.remove('loading');
                }

            /* ─ SIGN IN ─ */
            } else {
                btn.classList.add('loading');
                try {
                    const res  = await fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        window.location.href = '/dashboard';
                    } else {
                        showError(data.error || 'Invalid email or password.');
                        btn.classList.remove('loading');
                    }
                } catch (e) {
                    showError('Connection error. Please try again.');
                    btn.classList.remove('loading');
                }
            }
        }

        /* ── Allow Enter key to submit ── */
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
