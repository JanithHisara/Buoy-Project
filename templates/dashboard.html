<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanNav — Dashboard</title>
    
    <!-- Google Fonts commented out for offline support -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='maplibre/maplibre-gl.css') }}">
    <style>
        /* Additional animation container styles - preserves original dashboard look */
        .map-wrapper {
            position: relative;
            width: 100%;
            height: 480px;
            border-radius: 12px;
            overflow: hidden;
            background: #040e1a;
            transition: all 0.3s ease;
        }
        
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(135deg, rgba(4, 14, 26, 0.95), rgba(4, 14, 26, 0.85));
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 12px 12px 0 0;
            pointer-events: none;
        }
        
        .map-header h3 {
            font-family: 'Syne', 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #e0f0ff;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }
        
        /* Animation Canvas fills the wrapper */
        #oceanCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #040e1a;
        }
        
        /* GPS overlay matching original style */
        .gps-overlay {
            position: absolute;
            bottom: 12px;
            left: 15px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #8fdfff;
            z-index: 10;
            border-left: 2px solid #00c8ff;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
        
        /* Keep all original stat cards and sidebar intact */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        
        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Syne', 'Segoe UI', sans-serif;
            margin-bottom: 5px;
        }
        
        .stat-value.accent { color: #00c8ff; }
        .stat-value.success { color: #00ff9d; }
        .stat-value.warning { color: #ffaa44; }
        
        .stat-delta {
            font-size: 11px;
            opacity: 0.6;
        }
        
        .stat-delta.up { color: #00ff9d; }
        
        /* Additional status indicator */
        .live-badge {
            position: absolute;
            top: 12px;
            right: 15px;
            background: rgba(0, 200, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: #00c8ff;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
        }

        /* Topbar styles */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .topbar-title {
            font-size: 24px;
            font-weight: 600;
            font-family: 'Syne', 'Segoe UI', sans-serif;
        }
        
        .topbar-subtitle {
            font-size: 14px;
            opacity: 0.7;
            font-weight: normal;
        }
        
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 200, 255, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff9d;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        /* Notification styles */
        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 30, 45, 0.95);
            backdrop-filter: blur(12px);
            border-left: 3px solid #00c8ff;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #e0f0ff;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        
        .notif.show {
            transform: translateX(0);
        }
        
        @media (max-width: 768px) {
            .map-wrapper { height: 380px; }
            .stat-value { font-size: 22px; }
            .stats-row { gap: 10px; }
            .stat-card { padding: 10px; }
        }
    </style>
</head>
<body>
    <div id="app">
        {% include 'sidebar.html' %}
        
        <div id="main">
            <div class="topbar">
                <div class="topbar-title" id="topbar-title">
                    Dashboard <span class="topbar-subtitle">/ Overview</span>
                </div>
                <div class="status-pill">
                    <div class="status-dot"></div>
                    System Online
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-label">Dark</span>
                    <div class="toggle-switch"></div>
                </button>
            </div>
            
            <div id="content-area" style="display: flex; gap: 24px; align-items: stretch; flex-wrap: wrap;">
                
                <!-- Left Side: Stats Column -->
                <div class="stats-column" style="display: flex; flex-direction: column; gap: 20px; flex: 1; min-width: 250px; max-width: 300px;">
                    <div class="stat-card" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div class="stat-label">Total Buoys</div>
                        <div class="stat-value" id="total-buoys-count">0</div>
                        <div class="stat-delta">Total devices registered</div>
                    </div>
                    <div class="stat-card" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div class="stat-label">Active Buoys</div>
                        <div class="stat-value accent" id="active-buoys-count">0</div>
                        <div class="stat-delta">Currently online</div>
                    </div>
                    <div class="stat-card" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div class="stat-label">Signal Lost</div>
                        <div class="stat-value warning" id="signal-lost-count">0</div>
                        <div class="stat-delta">Requires attention</div>
                    </div>
                </div>
                
                <!-- Right Side: Square Mini Map Section -->
                <div class="map-wrapper" style="flex: 2; aspect-ratio: 1/1; min-width: 400px; max-height: 75vh; position: relative; border-radius: 16px; overflow: hidden; background: #040e1a; border: 1px solid var(--border);">
                    <div class="map-header" style="position: absolute; top: 0; left: 0; width: 100%; z-index: 2; background: linear-gradient(to bottom, rgba(4,14,26,0.9), transparent); padding: 15px;">
                        <h3 style="margin: 0; font-size: 14px; color: #fff;">🌊 Nearest LoRa Range</h3>
                    </div>
                    <div id="miniMap" style="width: 100%; height: 100%;"></div>
                </div>
                
            </div>
        </div>
    </div>
    
    <div class="notif" id="notif">
        <span>💡</span>
        <span id="notif-msg"></span>
    </div>
    
    <!-- Leaflet removed - no external script needed -->
    <!-- Main.js kept but will handle offline gracefully -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='maplibre/maplibre-gl.js') }}"></script>
    <script>
        (async function() {
            try {
                const res = await fetch('/static/map-style.json');
                const style = await res.json();
                
                style.sources.openmaptiles.tiles = [
                    window.location.origin + '/tiles/{z}/{x}/{y}.pbf'
                ];

                const map = new maplibregl.Map({
                    container: 'miniMap',
                    style: style,
                    center: [79.8612, 6.9271],
                    zoom: 15,
                    interactive: false,
                    attributionControl: false
                });

                let userMarker, buoyMarker;

                map.on('load', function() {
                    // Check if geolocation is supported
                    if ("geolocation" in navigator) {
                        navigator.geolocation.watchPosition(
                            async (position) => {
                                const userLon = position.coords.longitude;
                                const userLat = position.coords.latitude;
                                
                                // Center mini-map on tablet's location
                                map.setCenter([userLon, userLat]);
                                
                                // Update tablet (user) marker
                                if (!userMarker) {
                                    const userEl = document.createElement('div');
                                    userEl.style.width = '18px';
                                    userEl.style.height = '18px';
                                    userEl.style.background = '#0077ff';
                                    userEl.style.borderRadius = '50%';
                                    userEl.style.boxShadow = '0 0 15px #0077ff';
                                    userEl.style.border = '2px solid white';
                                    
                                    userMarker = new maplibregl.Marker({element: userEl})
                                        .setLngLat([userLon, userLat])
                                        .addTo(map);
                                } else {
                                    userMarker.setLngLat([userLon, userLat]);
                                }
                                
                                // Fetch buoys to find the nearest one
                                try {
                                    const devRes = await fetch('/api/devices');
                                    const devices = await devRes.json();
                                    
                                    if(devices && devices.length > 0) {
                                        // Find the closest buoy
                                        let nearestDevice = devices[0];
                                        let minDistance = Infinity;
                                        
                                        devices.forEach(d => {
                                            const dLon = parseFloat(d.lon);
                                            const dLat = parseFloat(d.lat);
                                            const dist = Math.pow(dLon - userLon, 2) + Math.pow(dLat - userLat, 2);
                                            if (dist < minDistance) {
                                                minDistance = dist;
                                                nearestDevice = d;
                                            }
                                        });
                                        
                                        const centerLon = parseFloat(nearestDevice.lon);
                                        const centerLat = parseFloat(nearestDevice.lat);
                                        
                                        // Generate a 10km range circle using pure math
                                        const radiusKm = 10;
                                        const points = 64;
                                        const coords = [];
                                        const distanceX = radiusKm / (111.320 * Math.cos(centerLat * Math.PI / 180));
                                        const distanceY = radiusKm / 110.574;
                                        
                                        for(let i = 0; i < points; i++) {
                                            const theta = (i / points) * (2 * Math.PI);
                                            const x = distanceX * Math.cos(theta);
                                            const y = distanceY * Math.sin(theta);
                                            coords.push([centerLon + x, centerLat + y]);
                                        }
                                        coords.push(coords[0]); // Close polygon
                                        
                                        const geojson = {
                                            type: 'Feature',
                                            geometry: {
                                                type: 'Polygon',
                                                coordinates: [coords]
                                            }
                                        };
                                        
                                        if (map.getSource('loraRange')) {
                                            map.getSource('loraRange').setData(geojson);
                                        } else {
                                            map.addSource('loraRange', {
                                                type: 'geojson',
                                                data: geojson
                                            });
                                            
                                            map.addLayer({
                                                id: 'loraRangeFill',
                                                type: 'fill',
                                                source: 'loraRange',
                                                paint: {
                                                    'fill-color': '#00d4ff',
                                                    'fill-opacity': 0.15
                                                }
                                            });
                                            
                                            map.addLayer({
                                                id: 'loraRangeBorder',
                                                type: 'line',
                                                source: 'loraRange',
                                                paint: {
                                                    'line-color': '#00d4ff',
                                                    'line-width': 2,
                                                    'line-dasharray': [4, 4]
                                                }
                                            });
                                        }
                                        
                                        // Update marker for the buoy itself
                                        if (!buoyMarker) {
                                            const el = document.createElement('div');
                                            el.style.width = '16px';
                                            el.style.height = '16px';
                                            el.style.background = '#00e5b0';
                                            el.style.borderRadius = '50%';
                                            el.style.boxShadow = '0 0 12px #00e5b0';
                                            el.style.border = '2px solid white';
                                            
                                            buoyMarker = new maplibregl.Marker({element: el})
                                                .setLngLat([centerLon, centerLat])
                                                .addTo(map);
                                        } else {
                                            buoyMarker.setLngLat([centerLon, centerLat]);
                                        }
                                    }
                                } catch (e) {
                                    console.error("Failed to fetch devices for nearest buoy:", e);
                                }
                            },
                            (err) => { console.warn('Geolocation error:', err); },
                            { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 }
                        );
                    } else {
                        console.warn("Geolocation is not supported by this browser.");
                    }
                });
            } catch (err) {
                console.error("Mini map load failed:", err);
            }
        })();
        
        // Theme toggle function
        if(typeof toggleTheme === 'undefined') {
            window.toggleTheme = function() {
                const themeLabel = document.getElementById('theme-label');
                const body = document.body;
                if(body.style.background === 'rgb(240, 240, 240)' || body.style.background === '#f0f0f0') {
                    body.style.background = '#040e1a';
                    body.style.color = 'white';
                    if(themeLabel) themeLabel.innerText = 'Dark';
                } else {
                    body.style.background = '#f0f0f0';
                    body.style.color = '#040e1a';
                    if(themeLabel) themeLabel.innerText = 'Light';
                }
            };
        }
        
        // Ensure notification is hidden initially
        const notifElement = document.getElementById('notif');
        if(notifElement) {
            notifElement.classList.remove('show');
        }
    </script>
</body>
</html>
