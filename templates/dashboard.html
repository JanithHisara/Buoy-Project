<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanNav — Dashboard</title>
    
    <!-- Google Fonts commented out for offline support -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> -->
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Additional animation container styles - preserves original dashboard look */
        .map-wrapper {
            position: relative;
            width: 100%;
            height: 480px;
            border-radius: 12px;
            overflow: hidden;
            background: #040e1a;
            transition: all 0.3s ease;
        }
        
        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(135deg, rgba(4, 14, 26, 0.95), rgba(4, 14, 26, 0.85));
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 12px 12px 0 0;
            pointer-events: none;
        }
        
        .map-header h3 {
            font-family: 'Syne', 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #e0f0ff;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }
        
        /* Animation Canvas fills the wrapper */
        #oceanCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #040e1a;
        }
        
        /* GPS overlay matching original style */
        .gps-overlay {
            position: absolute;
            bottom: 12px;
            left: 15px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #8fdfff;
            z-index: 10;
            border-left: 2px solid #00c8ff;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
        
        /* Keep all original stat cards and sidebar intact */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        
        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Syne', 'Segoe UI', sans-serif;
            margin-bottom: 5px;
        }
        
        .stat-value.accent { color: #00c8ff; }
        .stat-value.success { color: #00ff9d; }
        .stat-value.warning { color: #ffaa44; }
        
        .stat-delta {
            font-size: 11px;
            opacity: 0.6;
        }
        
        .stat-delta.up { color: #00ff9d; }
        
        /* Additional status indicator */
        .live-badge {
            position: absolute;
            top: 12px;
            right: 15px;
            background: rgba(0, 200, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            color: #00c8ff;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
        }

        /* Topbar styles */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .topbar-title {
            font-size: 24px;
            font-weight: 600;
            font-family: 'Syne', 'Segoe UI', sans-serif;
        }
        
        .topbar-subtitle {
            font-size: 14px;
            opacity: 0.7;
            font-weight: normal;
        }
        
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 200, 255, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff9d;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        /* Notification styles */
        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 30, 45, 0.95);
            backdrop-filter: blur(12px);
            border-left: 3px solid #00c8ff;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #e0f0ff;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        
        .notif.show {
            transform: translateX(0);
        }
        
        @media (max-width: 768px) {
            .map-wrapper { height: 380px; }
            .stat-value { font-size: 22px; }
            .stats-row { gap: 10px; }
            .stat-card { padding: 10px; }
        }
    </style>
</head>
<body>
    <div id="app">
        {% include 'sidebar.html' %}
        
        <div id="main">
            <div class="topbar">
                <div class="topbar-title" id="topbar-title">
                    Dashboard <span class="topbar-subtitle">/ Overview</span>
                </div>
                <div class="status-pill">
                    <div class="status-dot"></div>
                    System Online
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-label">Dark</span>
                    <div class="toggle-switch"></div>
                </button>
            </div>
            
            <div id="content-area">
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Active Buoys</div>
                        <div class="stat-value accent">14</div>
                        <div class="stat-delta up">▲ 2 since yesterday</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">GPS Points</div>
                        <div class="stat-value success" id="gps-count">0</div>
                        <div class="stat-delta">Collected today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Alerts</div>
                        <div class="stat-value warning">3</div>
                        <div class="stat-delta">Requires attention</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Coverage</div>
                        <div class="stat-value">84%</div>
                        <div class="stat-delta">Zone A–F</div>
                    </div>
                </div>
                
                <!-- Map section replaced with Animation Canvas -->
                <div class="map-wrapper">
                    <div class="map-header">
                        <h3>🌊 Ocean Dynamics — Live Marine Traffic</h3>
                        <div class="live-badge">⚡ REAL-TIME VIZ</div>
                    </div>
                    <canvas id="oceanCanvas"></canvas>
                    <div class="gps-overlay" id="liveCoords">--</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="notif" id="notif">
        <span>💡</span>
        <span id="notif-msg"></span>
    </div>
    
    <!-- Leaflet removed - no external script needed -->
    <!-- Main.js kept but will handle offline gracefully -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // ===================================================================
        // FULLY OFFLINE-READY ANIMATION ENGINE
        // NO EXTERNAL DEPENDENCIES - WORKS INSTANTLY OFFLINE
        // MAP REMOVED | SCAN GPS & CONNECT BUTTONS REMOVED
        // ===================================================================
        
        (function() {
            // Check if we're online/offline and handle gracefully
            const isOffline = !navigator.onLine;
            
            // ----- CANVAS SETUP -----
            const canvas = document.getElementById('oceanCanvas');
            if (!canvas) {
                console.error('Canvas element not found');
                return;
            }
            const ctx = canvas.getContext('2d');
            
            let W = 0, H = 0;
            let animationTime = 0;
            let animationFrameId = null;
            
            function resizeCanvas() {
                const container = canvas.parentElement;
                if (!container) return;
                const rect = container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                W = canvas.width = rect.width * dpr;
                H = canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + "px";
                canvas.style.height = rect.height + "px";
            }
            
            // Fallback if resize doesn't happen immediately
            setTimeout(resizeCanvas, 100);
            window.addEventListener('resize', resizeCanvas);
            
            /* -------------------- BUOYS -------------------- */
            const buoyCount = 6;
            const buoys = Array.from({length: buoyCount}).map((_, idx) => ({
                x: Math.random(),
                y: 0.2 + Math.random() * 0.6,
                r: 0,
                alpha: 0.7,
                id: idx + 1
            }));
            
            /* -------------------- SHIPS -------------------- */
            const ships = [];
            
            function createShip() {
                return {
                    x: Math.random() * 800,
                    y: 200 + Math.random() * 140,
                    speed: 0.5 + Math.random() * 1.3,
                    dir: Math.random() > 0.5 ? 1 : -1,
                    size: 0.7 + Math.random() * 0.9,
                    offset: Math.random() * 1000,
                    color: `hsl(${190 + Math.random() * 30}, 70%, 55%)`
                };
            }
            
            for(let i = 0; i < 3; i++) ships.push(createShip());
            
            /* -------------------- PARTICLES -------------------- */
            let particles = [];
            const PARTICLE_COUNT = 70;
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random(),
                    y: Math.random(),
                    size: 1 + Math.random() * 2.5,
                    speedX: (Math.random() - 0.5) * 0.0012,
                    speedY: (Math.random() - 0.5) * 0.0008 + 0.0003,
                    alpha: 0.2 + Math.random() * 0.4
                });
            }
            
            /* -------------------- DASHBOARD INTEGRATION -------------------- */
            let gpsPointCount = 147;
            const gpsCountSpan = document.getElementById('gps-count');
            const liveCoordsSpan = document.getElementById('liveCoords');
            const notifDiv = document.getElementById('notif');
            const notifMsg = document.getElementById('notif-msg');
            
            function showNotif(message) {
                if(notifMsg) {
                    notifMsg.innerText = message;
                    notifDiv.classList.add('show');
                    setTimeout(() => notifDiv.classList.remove('show'), 3000);
                } else {
                    console.log("Notification:", message);
                }
            }
            
            // Simulate GPS data - works offline
            function updateGpsStats() {
                try {
                    // Increment GPS points randomly
                    if(Math.random() < 0.3) {
                        gpsPointCount += Math.floor(Math.random() * 3) + 1;
                        if(gpsPointCount > 1250) gpsPointCount = 280;
                        if (gpsCountSpan) gpsCountSpan.textContent = gpsPointCount;
                    }
                    
                    // Generate realistic Colombo coordinates
                    const baseLat = 6.9271;
                    const baseLon = 79.8612;
                    const latOffset = Math.sin(animationTime * 0.2) * 0.008;
                    const lonOffset = Math.cos(animationTime * 0.17) * 0.006;
                    const lat = (baseLat + latOffset).toFixed(4);
                    const lon = (baseLon + lonOffset).toFixed(4);
                    if (liveCoordsSpan) {
                        liveCoordsSpan.innerHTML = `📍 ${lat}°N, ${lon}°E  •  ${Math.floor(10 + Math.sin(animationTime) * 5)} knots`;
                    }
                } catch(e) {
                    console.log('GPS update error:', e);
                }
            }
            
            /* -------------------- DRAW LOOP -------------------- */
            function drawOcean() {
                try {
                    if(!ctx) {
                        requestAnimationFrame(drawOcean);
                        return;
                    }
                    if(W === 0 || H === 0) {
                        resizeCanvas();
                        requestAnimationFrame(drawOcean);
                        return;
                    }
                    
                    ctx.clearRect(0, 0, W, H);
                    
                    // Deep ocean background
                    const grad = ctx.createLinearGradient(0, 0, 0, H);
                    grad.addColorStop(0, '#021a2a');
                    grad.addColorStop(1, '#030c14');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, H);
                    
                    /* -------- WATER WAVES -------- */
                    for(let l = 0; l < 5; l++) {
                        const base = H * (0.2 + l * 0.15);
                        const amp = 6 + l * 3;
                        
                        ctx.beginPath();
                        for(let x = 0; x <= W; x += 5) {
                            const y = base +
                                Math.sin(x * 0.01 + animationTime * (0.3 + l * 0.2)) * amp +
                                Math.sin(x * 0.02 - animationTime * 0.2) * amp * 0.5;
                            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                        }
                        ctx.lineTo(W, H);
                        ctx.lineTo(0, H);
                        ctx.fillStyle = `rgba(0, 120, 220, ${0.03 + l * 0.02})`;
                        ctx.fill();
                    }
                    
                    /* -------- MARINE PARTICLES -------- */
                    particles.forEach(p => {
                        p.x += p.speedX;
                        p.y += p.speedY;
                        if(p.x < 0) p.x = 1;
                        if(p.x > 1) p.x = 0;
                        if(p.y < 0) p.y = 1;
                        if(p.y > 1) p.y = 0;
                        
                        const px = p.x * W;
                        const py = p.y * H;
                        ctx.beginPath();
                        ctx.arc(px, py, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(100, 200, 255, ${p.alpha * 0.4})`;
                        ctx.fill();
                    });
                    
                    /* -------- BUOYS -------- */
                    buoys.forEach((b) => {
                        const bx = b.x * W;
                        const by = b.y * H;
                        
                        b.r += 0.65;
                        b.alpha -= 0.012;
                        if(b.r > 42) {
                            b.r = 0;
                            b.alpha = 0.7;
                        }
                        
                        ctx.beginPath();
                        ctx.arc(bx, by, b.r, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 200, 255, ${b.alpha})`;
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.arc(bx, by, 5, 0, Math.PI * 2);
                        ctx.fillStyle = "#00c8ff";
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.arc(bx, by, 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = "#ffffff";
                        ctx.fill();
                        
                        ctx.fillStyle = "#aaffff";
                        ctx.font = "9px monospace";
                        ctx.fillText(`B-${b.id}`, bx + 7, by - 6);
                    });
                    
                    /* -------- SHIPS -------- */
                    ships.forEach(ship => {
                        ship.x += ship.speed * ship.dir;
                        
                        if(ship.dir === 1 && ship.x > W + 80) ship.x = -80;
                        if(ship.dir === -1 && ship.x < -80) ship.x = W + 80;
                        
                        const bob = Math.sin(animationTime * 1.5 + ship.offset) * 4;
                        
                        ctx.save();
                        ctx.translate(ship.x, ship.y + bob);
                        ctx.scale(ship.size, ship.size);
                        ctx.rotate(Math.sin(animationTime + ship.offset) * 0.04);
                        
                        ctx.beginPath();
                        ctx.moveTo(-25, 0);
                        ctx.lineTo(25, 0);
                        ctx.lineTo(18, 10);
                        ctx.lineTo(-18, 10);
                        ctx.closePath();
                        ctx.fillStyle = ship.color;
                        ctx.fill();
                        
                        ctx.fillStyle = "#d8eaf5";
                        ctx.fillRect(-8, -15, 16, 15);
                        
                        ctx.fillStyle = "#0088cc";
                        ctx.fillRect(-5, -12, 3, 3);
                        ctx.fillRect(0, -12, 3, 3);
                        
                        ctx.restore();
                        
                        ctx.beginPath();
                        for(let i = 0; i < 35; i++) {
                            const wx = ship.x - i * 3 * ship.dir;
                            const wy = ship.y + 10 + Math.sin(i * 0.3 + animationTime) * 2;
                            if(i === 0) ctx.moveTo(wx, wy);
                            else ctx.lineTo(wx, wy);
                        }
                        ctx.strokeStyle = "rgba(255, 255, 245, 0.2)";
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    });
                    
                    /* -------- OCEAN GLINTS -------- */
                    for(let i = 0; i < 30; i++) {
                        const fx = (Math.sin(animationTime * 0.8 + i) * 0.6 + 0.5) * W;
                        const fy = H * (0.25 + Math.sin(animationTime * 1.2 + i) * 0.08);
                        ctx.beginPath();
                        ctx.arc(fx, fy, 1.2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 245, 200, 0.35)`;
                        ctx.fill();
                    }
                    
                    updateGpsStats();
                    animationTime += 0.016;
                    animationFrameId = requestAnimationFrame(drawOcean);
                } catch(e) {
                    console.log('Draw error:', e);
                    animationFrameId = requestAnimationFrame(drawOcean);
                }
            }
            
            // Initialize
            function initAnimation() {
                resizeCanvas();
                if (gpsCountSpan) gpsCountSpan.textContent = gpsPointCount;
                drawOcean();
            }
            
            function handleResizeAndReposition() {
                resizeCanvas();
                if (ships.length && W > 0) {
                    ships.forEach(ship => {
                        if(ship.x > W) ship.x = W * 0.6;
                        if(ship.x < 0) ship.x = W * 0.4;
                        ship.y = H * (0.35 + Math.random() * 0.4);
                    });
                }
            }
            
            window.removeEventListener('resize', resizeCanvas);
            window.addEventListener('resize', handleResizeAndReposition);
            
            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initAnimation);
            } else {
                initAnimation();
            }
            
            // Legacy functions
            window.scanGPS = function() {
                showNotif('GPS simulation active • Data flowing');
            };
            
            window.connectToDevice = function() {
                showNotif('Marine data stream active');
            };
            
            // Simulate data refresh
            setInterval(() => {
                if(Math.random() < 0.15) {
                    const newPointCount = Math.floor(Math.random() * 12);
                    gpsPointCount += newPointCount;
                    if(gpsPointCount > 1350) gpsPointCount = 300;
                    if (gpsCountSpan) gpsCountSpan.textContent = gpsPointCount;
                    if(newPointCount > 5) {
                        showNotif(`📡 ${newPointCount} new GPS points acquired`);
                    }
                }
            }, 5500);
            
            // Show offline status if needed
            if (isOffline) {
                setTimeout(() => showNotif('📡 Offline mode • Simulation active'), 1000);
            }
        })();
        
        // Theme toggle function
        if(typeof toggleTheme === 'undefined') {
            window.toggleTheme = function() {
                const themeLabel = document.getElementById('theme-label');
                const body = document.body;
                if(body.style.background === 'rgb(240, 240, 240)' || body.style.background === '#f0f0f0') {
                    body.style.background = '#040e1a';
                    body.style.color = 'white';
                    if(themeLabel) themeLabel.innerText = 'Dark';
                } else {
                    body.style.background = '#f0f0f0';
                    body.style.color = '#040e1a';
                    if(themeLabel) themeLabel.innerText = 'Light';
                }
            };
        }
        
        // Ensure notification is hidden initially
        const notifElement = document.getElementById('notif');
        if(notifElement) {
            notifElement.classList.remove('show');
        }
    </script>
</body>
</html>
