<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OceanNav — Devices</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>

<body>

<div id="app">
    {% include 'sidebar.html' %}
    <div id="main">
        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-title">
                Device Setup
                <span class="topbar-subtitle">/ Manage buoys</span>
            </div>
            <div class="status-pill">
                <div class="status-dot"></div>
                System Online
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-label">Dark</span>
                <div class="toggle-switch"></div>
            </button>
        </div>
        <!-- CONTENT -->
        <div id="content-area">
            <!-- PORT ROW -->
            <div class="port-row">
                <!-- TOGGLE -->
                <div class="conn-toggle">
                    <span class="toggle-label active"
                          id="serial-label">
                        Serial
                    </span>
                    <label class="switch">
                        <input type="checkbox"
                               id="conn-toggle"
                               onchange="toggleConnectionType()">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label"
                          id="ethernet-label">
                        Ethernet
                    </span>
                </div>
                <!-- SERIAL -->
                <div class="conn-input"
                     id="serial-section">
                    <select class="port-select"
                            id="ports">
                        <option>
                            Loading ports...
                        </option>
                    </select>
                    <button class="action-btn refresh"
                            onclick="loadPorts()">
                        Refresh
                    </button>
                </div>
                <!-- ETHERNET -->
                <div class="conn-input"
                     id="ethernet-section"
                     style="display:none;">
                    <input type="text"
                           id="device-ip"
                           placeholder="Enter device IP"
                           class="port-select">
                </div>
                <!-- ACTIONS -->
                <div class="conn-actions">
                    <button class="action-btn connect"
                            onclick="connectToDevice()">
                        Connect
                    </button>
                </div>
            </div>
            <!-- SECTION HEADER -->
            <div class="section-header">
                <div class="section-title">
                    Buoy Devices
                </div>
                <button type="button"
                        class="add-btn"
                        onclick="openDevicePanel()">
                    <svg width="14"
                         height="14"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2">
                        <line x1="12" y1="5"
                              x2="12" y2="19"></line>
                        <line x1="5" y1="12"
                              x2="19" y2="12"></line>
                    </svg>
                    Add Device
                </button>
            </div>
            <!-- DEVICES GRID WITH SCROLL -->
            <div class="devices-wrapper">
                <div class="devices-grid"
                     id="devices-grid">
                </div>
            </div>
        </div>
    </div>
</div>
<!-- ===================================================== -->
<!-- RIGHT PANEL -->
<!-- ===================================================== -->
<div class="device-panel"
     id="device-panel">
    <div class="panel-header">
        <h3 id="panel-title">
            Add Device
        </h3>
        <button class="close-panel"
                onclick="closeDevicePanel()">

            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div class="panel-body">
        <input type="hidden"
               id="edit-index">
        <div class="input-group">
            <label>
                Device Name
            </label>
            <input type="text"
                   id="device-name-input"
                   placeholder="Enter device name">
        </div>
        <div class="input-group">
            <label>
                Device ID
            </label>
            <input type="text"
                   id="device-id-input"
                   placeholder="Enter device ID">
        </div>
        <!-- GPS preview container (shown after coordinates received) -->
        <div id="gps-preview-container" style="display:none; margin-bottom: 16px;"></div>
        <button class="connect-save-btn"
                id="save-btn"
                onclick="handleConnectAndSave()">
            <span id="save-btn-text">
                <i class="fa-solid fa-link"></i>
                Connect Device
            </span>
        </button>
    </div>
</div>
<!-- OVERLAY -->
<div class="panel-overlay"
     id="panel-overlay"
     onclick="closeDevicePanel()">
</div>
<!-- ===================================================== -->
<!-- SCREEN FREEZE LOADING OVERLAY (Global) -->
<!-- ===================================================== -->
<div id="global-loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:10000; justify-content:center; align-items:center; flex-direction:column; gap:16px;">
    <div class="loading-spinner" style="width:48px; height:48px; border-width:3px;"></div>
    <div style="color:var(--accent); font-family:'Syne',sans-serif; font-weight:600; letter-spacing:1px;">PROCESSING REQUEST...</div>
    <div style="color:var(--text-secondary); font-size:13px;">Please wait while we connect to backend</div>
</div>
<!-- ===================================================== -->
<!-- NOTIFICATION - BOTTOM RIGHT CORNER (FIXED) -->
<!-- ===================================================== -->
<div class="notif"
     id="notif">
    <span>💡</span>
    <span id="notif-msg"></span>
</div>

<!-- ===================================================== -->
<!-- CSS (ORIGINAL STYLES + SCROLLABLE GRID + NOTIFICATION FIX) -->
<!-- ===================================================== -->

<style>

/* =====================================================
   DEVICE PANEL
===================================================== */

.device-panel{
    position: fixed;
    top: 0;
    right: -420px;
    width: 400px;
    max-width: 100%;
    height: 100%;
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    z-index: 9999;
    transition: 0.3s ease;
    padding: 24px;
    overflow-y: auto;
}

.device-panel.active{
    right:0;
}

.panel-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(4px);
    z-index:9998;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.panel-overlay.active{
    opacity:1;
    visibility:visible;
}

.panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
}

.panel-header h3{
    margin:0;
    color:var(--text-primary);
    font-family:'Syne',sans-serif;
}

.close-panel{
    width:38px;
    height:38px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    color:var(--text-primary);
    cursor:pointer;
}

.panel-body{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.input-group label{
    color:var(--text-secondary);
    font-size:13px;
}

.input-group input{
    height:46px;
    border-radius:var(--radius-sm);
    border:1px solid var(--border);
    background:var(--bg-secondary);
    color:var(--text-primary);
    padding:0 14px;
    outline:none;
}

.connect-save-btn{
    height:50px;
    border:none;
    border-radius:var(--radius-sm);
    background:var(--accent-glow);
    border:1px solid rgba(0,212,255,0.3);
    color:var(--accent);
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.connect-save-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* =====================================================
   LOADING
===================================================== */

.loading-spinner{
    width:18px;
    height:18px;
    border:2px solid rgba(255,255,255,0.2);
    border-top:2px solid var(--accent);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* =====================================================
   DEVICE ACTIONS
===================================================== */

.device-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.device-action-btn{
    flex:1;
    height:40px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    color:var(--text-primary);
    cursor:pointer;
    transition:0.2s;
    font-size:15px;
}

.device-action-btn:hover{
    background:rgba(255,255,255,0.12);
    transform:translateY(-2px);
}

.device-action-btn.deactivate{
    background:rgba(255,71,87,0.1);
    color:#ff4757;
}

/* =====================================================
   SCROLLABLE DEVICES GRID
===================================================== */

.devices-wrapper {
    max-height: calc(100vh - 280px);
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
    margin-right: -4px;
}

.devices-wrapper::-webkit-scrollbar {
    width: 8px;
}

.devices-wrapper::-webkit-scrollbar-track {
    background: var(--bg-secondary);
    border-radius: 10px;
}

.devices-wrapper::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
}

.devices-wrapper::-webkit-scrollbar-thumb:hover {
    background: #00a8cc;
}

.devices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
}

/* Responsive adjustments */
@media(max-width:1200px){
    .devices-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:768px){
    .devices-grid{
        grid-template-columns:1fr;
    }
    .device-panel{
        width:100%;
    }
    .devices-wrapper {
        max-height: calc(100vh - 320px);
    }
}

.device-card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 20px;
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
}

.device-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
}

.device-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.device-icon {
    font-size: 2rem;
}

.device-status {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 30px;
    background: rgba(255,255,255,0.05);
}

.device-status.online {
    background: rgba(46, 209, 94, 0.2);
    color: #2ed15e;
}

.device-name {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
}

.device-id {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 16px;
}

.device-meta {
    display: flex;
    gap: 16px;
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 12px;
    margin: 12px 0;
}

.device-meta-item {
    flex: 1;
}

.device-meta-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
}

.device-meta-val {
    font-weight: 600;
    font-family: monospace;
    font-size: 0.9rem;
}

/* =====================================================
   NOTIFICATION - BOTTOM RIGHT CORNER
===================================================== */

.notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    left: auto;
    top: auto;
    transform: translateX(0) translateY(100px);
    background: var(--bg-card);
    border-left: 4px solid var(--accent);
    padding: 14px 24px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10001;
    transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    max-width: 380px;
    font-size: 14px;
}

.notif.show {
    transform: translateX(0) translateY(0);
    opacity: 1;
}

.notif span:first-child {
    font-size: 20px;
}

/* Theme toggle */
.theme-toggle {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    color: var(--text-primary);
}

/* Topbar styles */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 12, 20, 0.7);
    backdrop-filter: blur(8px);
    flex-wrap: wrap;
    gap: 16px;
}

.topbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.topbar-subtitle {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--text-secondary);
}

.status-pill {
    background: rgba(46, 209, 94, 0.12);
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 500;
    color: #2ed15e;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(46, 209, 94, 0.3);
}

.status-dot {
    width: 8px;
    height: 8px;
    background: #2ed15e;
    border-radius: 50%;
    box-shadow: 0 0 6px #2ed15e;
}

#content-area {
    padding: 28px 32px;
}

.port-row {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 18px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
}

.conn-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-secondary);
    padding: 4px 16px;
    border-radius: 48px;
}

.toggle-label {
    font-weight: 500;
    color: var(--text-secondary);
    cursor: default;
}

.toggle-label.active {
    color: var(--accent);
}

.switch {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 24px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;

}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.2s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: var(--accent);
}

input:checked + .slider:before {
    transform: translateX(24px);
}

.conn-input {
    display: flex;
    gap: 12px;
    flex: 2;
    min-width: 220px;
}

.port-select, #device-ip {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 0 16px;
    height: 46px;
    color: var(--text-primary);
    flex: 1;
    outline: none;
}

.action-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 0 20px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: 0.2s;
}

.action-btn.connect {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0c14;
    font-weight: bold;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
}

.add-btn {
    background: rgba(0, 212, 255, 0.12);
    border: 1px solid var(--accent);
    padding: 8px 18px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
}

</style>

<!-- ===================================================== -->
<!-- JS -->
<!-- ===================================================== -->

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>

/* =====================================================
   GLOBAL LOADING OVERLAY CONTROLS
===================================================== */

function showGlobalLoading(message = 'Processing request...') {
    const overlay = document.getElementById('global-loading-overlay');
    const msgElement = overlay.querySelector('div:last-child');
    if(msgElement) msgElement.textContent = message;
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function hideGlobalLoading() {
    const overlay = document.getElementById('global-loading-overlay');
    overlay.style.display = 'none';
    document.body.style.overflow = '';
}

/* =====================================================
   CONNECTION TYPE
===================================================== */

let connectionType = 'serial';
let devices = [];

async function loadDevices() {
    try {
        const response = await fetch('/api/devices');
        devices = await response.json();
        renderDevices();
    } catch (error) {
        console.error('Failed to load devices:', error);
        showNotif('Error loading devices from database', true);
    }
}

/* =====================================================
   LOAD PORTS
===================================================== */

async function loadPorts(){
    try{
        const response = await fetch('/ports');
        const ports = await response.json();
        const select = document.getElementById('ports');
        const currentValue = select.value;
        select.innerHTML = '';
        ports.forEach(port=>{
            const option = document.createElement('option');
            option.value = port;
            option.text = port;
            if(port === currentValue) option.selected = true;
            select.appendChild(option);
        });
    }catch(error){
        console.error(error);
    }
}

function toggleConnectionType(){
    const serialSection = document.getElementById('serial-section');
    const ethernetSection = document.getElementById('ethernet-section');
    const serialLabel = document.getElementById('serial-label');
    const ethernetLabel = document.getElementById('ethernet-label');
    connectionType = connectionType === 'serial' ? 'ethernet' : 'serial';
    if(connectionType === 'ethernet'){
        serialSection.style.display='none';
        ethernetSection.style.display='flex';
        serialLabel.classList.remove('active');
        ethernetLabel.classList.add('active');
    }else{
        serialSection.style.display='flex';
        ethernetSection.style.display='none';
        serialLabel.classList.add('active');
        ethernetLabel.classList.remove('active');
    }
}

async function connectToDevice(){
    let payload = {};
    if(connectionType === 'serial'){
        payload = { type:'serial', port: document.getElementById('ports').value };
    }else{
        const ip = document.getElementById('device-ip').value.trim();
        if(!ip){ showNotif('Enter valid IP'); return; }
        payload = { type:'ethernet', ip:ip };
    }
    showGlobalLoading('Connecting to device...');
    try{
        const response = await fetch('/connect',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await response.json();
        hideGlobalLoading();
        showNotif(data.message || 'Connected');
    }catch(error){
        hideGlobalLoading();
        showNotif('Connection request sent');
    }
}

function openDevicePanel(){
    resetGpsPendingState();
    document.getElementById('device-panel').classList.add('active');
    document.getElementById('panel-overlay').classList.add('active');
    document.getElementById('device-name-input').value = '';
    document.getElementById('device-id-input').value = '';
}

function closeDevicePanel(){
    resetGpsPendingState();
    document.getElementById('device-panel').classList.remove('active');
    document.getElementById('panel-overlay').classList.remove('active');
}

let pendingGpsData = null;

function resetGpsPendingState() {
    pendingGpsData = null;
    const previewContainer = document.getElementById('gps-preview-container');
    if(previewContainer) {
        previewContainer.style.display = 'none';
        previewContainer.innerHTML = '';
    }
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = false;
    document.getElementById('save-btn-text').innerHTML = `<i class="fa-solid fa-link"></i> Connect & Save Device`;
}

function showGpsPreview(lat, lon) {
    const container = document.getElementById('gps-preview-container');
    container.style.display = 'block';
    container.innerHTML = `
        <div style="background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--accent); font-size: 13px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                <span style="color: var(--accent);">📍 GPS Coordinates Received</span>
                <i class="fa-solid fa-check-circle" style="color: #2ed15e;"></i>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <div><span style="color: var(--text-secondary);">Latitude:</span> <strong>${lat.toFixed(6)}</strong></div>
                <div><span style="color: var(--text-secondary);">Longitude:</span> <strong>${lon.toFixed(6)}</strong></div>
            </div>
            <div style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">
                <i class="fa-solid fa-info-circle"></i> Click "Save Device" below to finalize
            </div>
        </div>
    `;
}

async function handleConnectAndSave() {
    if(pendingGpsData) {
        await finalizeSaveDevice();
        return;
    }
    const name = document.getElementById('device-name-input').value.trim();
    const deviceId = document.getElementById('device-id-input').value.trim();
    if(!name || !deviceId) { showNotif('Enter device name and ID'); return; }
    const saveBtn = document.getElementById('save-btn');
    saveBtn.disabled = true;
    document.getElementById('save-btn-text').innerHTML = `<div class="loading-spinner"></div> Requesting GPS data...`;
    showGlobalLoading('Fetching GPS coordinates from backend...');
    try {
        const response = await fetch('/gps/device_id', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ device_id: deviceId, device_name: name })
        });
        const data = await response.json();
        hideGlobalLoading();
        if(data.success && typeof data.lat === 'number' && typeof data.lon === 'number') {
            pendingGpsData = { lat: data.lat, lon: data.lon, name: name, deviceId: deviceId };
            showGpsPreview(data.lat, data.lon);
            document.getElementById('save-btn-text').innerHTML = `<i class="fa-regular fa-floppy-disk"></i> Save Device`;
            saveBtn.disabled = false;
            showNotif(`GPS coordinates received! Click Save to add device.`);
        } else {
            showNotif(data.message || 'Failed to get GPS coordinates from backend');
            resetGpsPendingState();
            saveBtn.disabled = false;
        }
    } catch(error) {
        hideGlobalLoading();
        showNotif('Backend connection failed. Could not retrieve GPS data.');
        resetGpsPendingState();
        saveBtn.disabled = false;
    }
}

async function finalizeSaveDevice() {
    if(!pendingGpsData) return;
    const { name, deviceId, lat, lon } = pendingGpsData;
    showGlobalLoading('Saving device to database...');
    try {
        const response = await fetch('/api/devices', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: deviceId, name: name, lat: lat, lon: lon })
        });
        const data = await response.json();
        hideGlobalLoading();
        if (data.success) {
            await loadDevices();
            closeDevicePanel();
            showNotif(`Device "${name}" added successfully to database`);
            setTimeout(() => {
                const wrapper = document.querySelector('.devices-wrapper');
                if(wrapper) wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'smooth' });
            }, 100);
        } else {
            showNotif(data.error || 'Failed to save device', true);
        }
    } catch (error) {
        hideGlobalLoading();
        showNotif('Failed to save device to database', true);
    }
    resetGpsPendingState();
}

function renderDevices(){
    const grid = document.getElementById('devices-grid');
    grid.innerHTML = '';
    if(devices.length === 0){
        grid.innerHTML = `<div style="color:var(--text-muted); padding:20px; text-align:center;">No devices added yet</div>`;
        return;
    }
    devices.forEach((device,index)=>{
        const isDeviceActive = device.active === 1 || device.active === true;
        grid.innerHTML += `
        <div class="device-card">
            <div class="device-top">
                <div class="device-icon ${isDeviceActive ? 'online' : 'offline'}">📡</div>
                <span class="device-status ${isDeviceActive ? 'online' : 'offline'}">${isDeviceActive ? 'Active' : 'Inactive'}</span>
            </div>
            <div class="device-name">${escapeHtml(device.name || device.id)}</div>
            <div class="device-id">Device ID : ${escapeHtml(device.id)}</div>
            <div class="device-meta">
                <div class="device-meta-item"><div class="device-meta-label">Latitude</div><div class="device-meta-val">${device.lat}</div></div>
                <div class="device-meta-item"><div class="device-meta-label">Longitude</div><div class="device-meta-val">${device.lon}</div></div>
            </div>
            <div class="device-actions">
                <button class="device-action-btn" onclick="openDirection(${device.lat},${device.lon})"><i class="fa-solid fa-location-arrow"></i></button>
                <button class="device-action-btn deactivate" onclick="toggleDevice(${index})">${isDeviceActive ? '<i class="fa-solid fa-power-off"></i>' : '<i class="fa-solid fa-play"></i>'}</button>
                <button class="device-action-btn" onclick="deleteDevice(${index})"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>`;
    });
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

async function toggleDevice(index){
    const device = devices[index];
    const isDeviceActive = device.active === 1 || device.active === true;
    const newActiveState = !isDeviceActive;
    showGlobalLoading(newActiveState ? 'Activating device...' : 'Deactivating device...');
    try {
        const response = await fetch(`/api/devices/${device.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ active: newActiveState })
        });
        hideGlobalLoading();
        await loadDevices();
        showNotif(newActiveState ? 'Device Activated' : 'Device Deactivated');
    } catch (error) {
        hideGlobalLoading();
        showNotif('Failed to update device status', true);
    }
}

async function deleteDevice(index){
    const device = devices[index];
    if(!confirm(`Delete device "${device.name || device.id}"?`)) return;
    showGlobalLoading('Deleting device...');
    try {
        const response = await fetch(`/api/devices/${device.id}`, {
            method: 'DELETE'
        });
        hideGlobalLoading();
        await loadDevices();
        showNotif('Device deleted successfully');
    } catch (error) {
        hideGlobalLoading();
        showNotif('Failed to delete device', true);
    }
}

function openDirection(lat,lon){ window.open(`https://www.google.com/maps?q=${lat},${lon}`, '_blank'); }

function showNotif(msg, isError = false) {
    const notif = document.getElementById('notif');
    const notifMsg = document.getElementById('notif-msg');
    notifMsg.innerText = msg;
    notif.classList.add('show');
    if(isError) notif.style.borderLeftColor = '#ff4757';
    else notif.style.borderLeftColor = 'var(--accent)';
    setTimeout(() => { notif.classList.remove('show'); }, 3000);
}

function toggleTheme() {
    const themeLabel = document.getElementById('theme-label');
    if(themeLabel.innerText === 'Dark') {
        themeLabel.innerText = 'Light';
        document.documentElement.style.setProperty('--bg-deep', '#f4f7fb');
        document.documentElement.style.setProperty('--bg-card', '#ffffff');
        document.documentElement.style.setProperty('--bg-secondary', '#eef2f6');
        document.documentElement.style.setProperty('--border', '#cdd9ed');
        document.documentElement.style.setProperty('--text-primary', '#111827');
        document.documentElement.style.setProperty('--text-secondary', '#4b5563');
    } else {
        themeLabel.innerText = 'Dark';
        document.documentElement.style.setProperty('--bg-deep', '#0a0c14');
        document.documentElement.style.setProperty('--bg-card', '#0f111a');
        document.documentElement.style.setProperty('--bg-secondary', '#141824');
        document.documentElement.style.setProperty('--border', '#232838');
        document.documentElement.style.setProperty('--text-primary', '#f0f3fa');
        document.documentElement.style.setProperty('--text-secondary', '#8e96b0');
    }
}

window.onload = ()=>{
    loadPorts();
    setInterval(loadPorts,5000);
    loadDevices();
    const root = document.documentElement;
    root.style.setProperty('--bg-deep', '#0a0c14');
    root.style.setProperty('--bg-card', '#0f111a');
    root.style.setProperty('--bg-secondary', '#141824');
    root.style.setProperty('--border', '#232838');
    root.style.setProperty('--text-primary', '#f0f3fa');
    root.style.setProperty('--text-secondary', '#8e96b0');
    root.style.setProperty('--text-muted', '#4a506c');
    root.style.setProperty('--accent', '#00d4ff');
    root.style.setProperty('--accent-glow', 'rgba(0, 212, 255, 0.08)');
    root.style.setProperty('--radius-sm', '14px');
    root.style.setProperty('--radius-md', '20px');
    root.style.setProperty('--shadow', '0 12px 28px rgba(0, 0, 0, 0.4)');
};

</script>
