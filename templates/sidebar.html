<div id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo-icon">🌊</div>
        <div class="sidebar-logo-text">Ocean<span>Nav</span></div>
    </div>
    <div class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#7a9ab5"/>
        </svg>
    </div>
    
    <div class="sidebar-nav">
        <div class="nav-section-label">Navigation</div>
        <div class="nav-item" onclick="navigateTo('/dashboard')" data-page="dashboard">
            <div class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                </svg>
            </div>
            <span class="nav-label">Dashboard</span>
        </div>
        <div class="nav-item" onclick="navigateTo('/map')" data-page="map">
            <div class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <polygon points="3 11 22 2 13 21 11 13 3 11"/>
                </svg>
            </div>
            <span class="nav-label">Live Map</span>
            <span class="nav-badge">LIVE</span>
        </div>
        <div class="nav-item" onclick="navigateTo('/devices')" data-page="devices">
            <div class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
            </div>
            <span class="nav-label">Device Setup</span>
            <span class="nav-badge" id="device-count">6</span>
        </div>
        <div class="nav-item" id="users-nav" onclick="navigateTo('/users')" data-page="users">
            <div class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </div>
            <span class="nav-label">Users</span>
        </div>
        <div class="nav-item" onclick="navigateTo('/settings')" data-page="settings">
            <div class="nav-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </div>
            <span class="nav-label">Settings</span>
        </div>
    </div>
    
    <div class="sidebar-footer">
        <div class="user-card sidebar-footer-labels">
            <div class="user-avatar" id="sidebar-avatar">{{ user.name[0] if user else 'A' }}</div>
            <div class="user-info">
                <div class="user-name" id="sidebar-name">{{ user.name if user else 'Admin User' }}</div>
                <div class="user-role" id="sidebar-role">{{ 'Administrator' if user.role == 'admin' else 'User' }}</div>
            </div>
        </div>
        <div class="sidebar-footer-btns sidebar-footer-labels">
            <button class="footer-btn" onclick="toggleTheme()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
                Theme
            </button>
            <button class="footer-btn danger" onclick="logout()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
            </button>
        </div>
    </div>
</div>
