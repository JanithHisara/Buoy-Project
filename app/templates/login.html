<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanNav — Login</title>
    <!-- Offline Fonts -->
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/inter/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/outfit/index.css') }}">
    <!-- Offline Phosphor Icons -->
    <link rel="stylesheet" href="{{ url_for('static', filename='phosphor-icons/regular/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='phosphor-icons/bold/style.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-brand">
                    <div class="brand-icon"><i class="ph-bold ph-waves"></i></div>
                    <h1>OceanNav</h1>
                    <p>Buoyancy Navigation System</p>
                </div>

                <!-- Auth Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
                    <div class="login-error" id="login-error"></div>
                </form>

                <!-- Signup Form -->
                <form class="login-form" id="signup-form" style="display:none" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="signup-name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="signup-password" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
                    <div class="login-error" id="signup-error"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
